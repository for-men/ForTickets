services:
  user-service:
    image: notitle1215/user-service:latest
    ports:
      - "12021:12021"
    depends_on:
      - postgres
    networks:
      - eureka-network
    command: [ "sh", "-c", "sleep 10 && java -jar app.jar" ]
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/fortickets'

  postgres:
    image: 'postgres:16.4'
    environment:
      - 'POSTGRES_DB=fortickets'
      - 'POSTGRES_USER=forman'
      - 'POSTGRES_PASSWORD=1234'
    ports:
      - '54322:5432'
    volumes:
      - ../db/user-service:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forman -d fortickets"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - eureka-network

networks:
  eureka-network:
    external: true  # 외부 네트워크 사용